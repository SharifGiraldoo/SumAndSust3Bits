# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     461147966174420993
  title:        "SumAndSub3Bits"
  author:       "Sharif Giraldo Obando"
  discord:      ""
  description:  "3-bit adder/subtractor using ripple-carry architecture and two's complement"
  language:     "Wokwi"
  clock_hz:     0

  tiles: "1x1"

pinout:
  # Inputs
  ui[0]: "M"    # Mode: 0 = addition, 1 = subtraction
  ui[1]: "A0"
  ui[2]: "A1"
  ui[3]: "A2"
  ui[4]: "B0"
  ui[5]: "B1"
  ui[6]: "B2"
  ui[7]: ""     

  # Outputs
  uo[0]: "S0"   # Least significant bit
  uo[1]: "S1"
  uo[2]: "S2"
  uo[3]: "Cout" # Carry / Borrow
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6
